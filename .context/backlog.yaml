# Backlog

# This project does not use a machine-readable backlog. Work is dispatched
# via the numbered prompt series under `.github/prompts/NN-*.md`; see
# `.github/prompts/README.md` for the execution order. Issues are created
# manually using the templates under `.github/ISSUE_TEMPLATE/`.
