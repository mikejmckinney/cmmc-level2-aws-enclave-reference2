name: Backlog → Issues
# Dispatches entries from .context/backlog.yaml into GitHub issues and
# funnels them into the gated Copilot assignment pipeline.
#
# Triggers:
#   - push to main when .context/backlog.yaml changes
#   - workflow_dispatch (with optional dry_run flag)
#
# For each backlog entry where `issue:` is not yet set, the workflow:
#   1. Validates the schema (check-jsonschema; hard fail on violation)
#   2. Checks depends_on: all deps must have `issue:` set AND be closed
#   3. Runs a duplicate-issue guard (searches by <!-- backlog-entry-id: id -->)
#   4. Expands missing body/acceptance_criteria via Claude API (if
#      ANTHROPIC_API_KEY is set); skips the entry if the key is absent
#   5. Creates the issue via `gh issue create`
#   6. Applies labels: `from-backlog` + `copilot:ready` (unless
#      auto_assign: false) + any entry-specific labels
#   7. Writes `issue: N` back to backlog.yaml (yq; preserves comments)
#   8. Commits and pushes the write-back when any new issues were created
#
# A job-summary table lists every entry touched with an emoji status and
# skip reason where applicable.
#
# Requires:
#   - CLAUDE_PAT repo secret (issues:write + contents:write)
#   - ANTHROPIC_API_KEY repo secret (optional; enables Claude expansion)
#
# Budget variables (set in repo Settings → Variables, or via scripts/setup.sh):
#   MAX_COPILOT_CONCURRENT  — concurrent cap (default 3)
#   MAX_COPILOT_DAILY       — 24h cap (default 20)
#   (These are consumed by agent-assign-copilot.yml, not this workflow.)

on:
  push:
    branches:
      - main
    paths: ['.context/backlog.yaml']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would be dispatched without creating issues'
        type: boolean
        default: false

concurrency:
  group: backlog-to-issues
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # CLAUDE_PAT is required to push the write-back commit later.
          token: ${{ secrets.CLAUDE_PAT }}

      - name: Install tools
        run: |
          pip install check-jsonschema --quiet
          # Pin yq to a known-good v4 release (preserves YAML comments on -i writes).
          # SHA-256 is pinned inline — mikefarah/yq's upstream `checksums` file is a
          # multi-column format incompatible with `sha256sum -c`. Verify the pinned
          # hash in-place with a single-line checksum check.
          YQ_VERSION=v4.44.3
          YQ_ASSET=yq_linux_amd64
          YQ_SHA256=a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
          wget -qO /tmp/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_ASSET}"
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

      - name: Validate backlog schema
        run: |
          check-jsonschema \
            --schemafile .context/backlog.schema.json \
            .context/backlog.yaml

      - name: Dispatch backlog entries
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess, sys, tempfile, urllib.request, urllib.error

          try:
              import yaml
          except ImportError:
              subprocess.run([sys.executable, '-m', 'pip', 'install', 'pyyaml', '-q'], check=True)
              import yaml

          DRY_RUN = os.environ.get('DRY_RUN', 'false').lower() == 'true'
          REPO = os.environ.get('REPO', '')
          ANTHROPIC_API_KEY = os.environ.get('ANTHROPIC_API_KEY', '')
          BACKLOG = '.context/backlog.yaml'
          GITHUB_OUTPUT = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          GITHUB_STEP_SUMMARY = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')


          def gh(*args):
              return subprocess.run(['gh'] + list(args), capture_output=True, text=True)


          def yq_set_issue(idx, num):
              """Write .entries[idx].issue = num into backlog.yaml, preserving comments."""
              subprocess.run(
                  ['yq', '-i', f'.entries[{idx}].issue = {num}', BACKLOG],
                  check=True,
              )


          def expand_with_claude(entry):
              """Call Anthropic API to fill in body/acceptance_criteria for a sparse entry."""
              role = entry.get('role', '') or ''
              phase = entry.get('phase')

              entry_yaml = yaml.dump(entry, default_flow_style=False)

              role_content = ''
              agent_path = f'.github/agents/{role}.agent.md'
              if role and os.path.isfile(agent_path):
                  with open(agent_path) as f:
                      role_content = f.read()

              roadmap_section = ''
              if phase is not None:
                  try:
                      with open('.context/roadmap.md') as f:
                          rm = f.read()
                      m = re.search(
                          rf'## Phase {re.escape(str(phase))}.*?(?=\n## |\Z)',
                          rm,
                          re.DOTALL,
                      )
                      if m:
                          roadmap_section = m.group(0)
                  except OSError:
                      pass

              quality_rules = ''
              qr_path = '.context/rules/domain_code_quality.md'
              if os.path.isfile(qr_path):
                  with open(qr_path) as f:
                      quality_rules = f.read()

              with open('.github/prompts/expand-backlog-entry.md') as f:
                  system_prompt = f.read()

              user_msg = (
                  f'Entry YAML:\n```yaml\n{entry_yaml}```\n\n'
                  f'Role context ({role or "none"}):\n{role_content or "N/A"}\n\n'
                  f'Roadmap Phase {phase if phase is not None else "N/A"}:\n'
                  f'{roadmap_section or "N/A (template placeholder — see no-fabrication rule)"}\n\n'
                  f'Domain code quality rules:\n{quality_rules or "N/A"}\n'
              )

              payload = json.dumps({
                  'model': 'claude-sonnet-4-6',
                  'max_tokens': 2048,
                  'system': system_prompt,
                  'messages': [{'role': 'user', 'content': user_msg}],
              }).encode()

              req = urllib.request.Request(
                  'https://api.anthropic.com/v1/messages',
                  data=payload,
                  headers={
                      'x-api-key': ANTHROPIC_API_KEY,
                      'anthropic-version': '2023-06-01',
                      'content-type': 'application/json',
                  },
              )

              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      data = json.loads(resp.read())
              except (urllib.error.URLError, OSError) as e:
                  print(f'Claude API error: {e}', file=sys.stderr)
                  return None

              text = (data.get('content') or [{}])[0].get('text', '')
              if not text:
                  return None

              # Extract YAML block (Claude wraps it in a fenced code block)
              m = re.search(r'```ya?ml\s*(.*?)\s*```', text, re.DOTALL)
              yaml_text = m.group(1) if m else text

              try:
                  expanded = yaml.safe_load(yaml_text)
                  if not isinstance(expanded, dict):
                      return None
                  return expanded
              except yaml.YAMLError as e:
                  print(f'Failed to parse Claude response as YAML: {e}', file=sys.stderr)
                  print(f'Response snippet: {yaml_text[:300]}', file=sys.stderr)
                  return None


          def build_issue_body(entry_id, body, ac):
              full_body = body.rstrip()
              if ac:
                  checklist = '\n'.join(f'- [ ] {item}' for item in ac)
                  full_body += f'\n\n## Acceptance Criteria\n\n{checklist}'
              full_body += f'\n\n<!-- backlog-entry-id: {entry_id} -->'
              return full_body


          def main():
              with open(BACKLOG) as f:
                  backlog = yaml.safe_load(f)

              entries = backlog.get('entries') or []
              summary_rows = []
              # Deferred write-backs: list of (index, issue_number)
              write_backs = []

              for i, entry in enumerate(entries):
                  entry_id = entry['id']
                  title = entry['title']

                  # ── Skip if already dispatched ───────────────────────────────
                  if entry.get('issue'):
                      summary_rows.append(
                          f'| ⏭️ | `{entry_id}` | {title} '
                          f'| Already dispatched (issue #{entry["issue"]}) |'
                      )
                      continue

                  # ── Check depends_on ─────────────────────────────────────────
                  deps = entry.get('depends_on') or []
                  skip_reason = None
                  for dep_id in deps:
                      dep_entry = next((e for e in entries if e['id'] == dep_id), None)
                      if dep_entry is None:
                          skip_reason = f'Dependency `{dep_id}` not found in backlog'
                          break
                      dep_issue = dep_entry.get('issue')
                      if not dep_issue:
                          skip_reason = f'Dependency `{dep_id}` not yet dispatched (no issue number)'
                          break
                      r = gh('issue', 'view', str(dep_issue),
                             '--repo', REPO, '--json', 'state', '--jq', '.state')
                      if r.returncode != 0:
                          err = (r.stderr or '').strip().replace('\n', ' ')[:120]
                          skip_reason = (
                              f'Could not check dependency `{dep_id}` '
                              f'(issue #{dep_issue}): {err or "gh issue view failed"}'
                          )
                          break
                      if r.stdout.strip() != 'CLOSED':
                          skip_reason = (
                              f'Dependency `{dep_id}` (issue #{dep_issue}) is not closed yet'
                          )
                          break

                  if skip_reason:
                      summary_rows.append(
                          f'| ⏸️ | `{entry_id}` | {title} | Waiting: {skip_reason} |'
                      )
                      continue

                  # ── Duplicate-issue guard ────────────────────────────────────
                  # Search for the <!-- backlog-entry-id: <id> --> footer in all issues.
                  r = gh(
                      'issue', 'list', '--repo', REPO,
                      '--state', 'all',
                      '--search', f'backlog-entry-id: {entry_id} in:body',
                      '--json', 'number',
                      '--jq', '.[0].number // empty',
                  )
                  if r.returncode != 0:
                      err = (r.stderr or '').strip().replace('\n', ' ')[:200]
                      summary_rows.append(
                          f'| ❌ | `{entry_id}` | {title} '
                          f'| Duplicate check failed: {err or "gh issue list failed"} |'
                      )
                      continue
                  existing_num_str = r.stdout.strip()
                  if existing_num_str and existing_num_str.isdigit():
                      num = int(existing_num_str)
                      # Update in-memory entry so downstream depends_on checks in the
                      # same run see this issue number (ISS-09).
                      entry['issue'] = num
                      if not DRY_RUN:
                          write_backs.append((i, num))
                          note = f'Found existing issue #{num} — write-back queued'
                      else:
                          note = f'Found existing issue #{num} — would write-back (dry run)'
                      summary_rows.append(
                          f'| 🔗 | `{entry_id}` | {title} | {note} |'
                      )
                      continue

                  # ── Expand missing body / acceptance_criteria ────────────────
                  body = entry.get('body', '') or ''
                  ac = entry.get('acceptance_criteria') or []

                  if not body or not ac:
                      if ANTHROPIC_API_KEY:
                          print(f'Expanding {entry_id} with Claude...', flush=True)
                          expanded = expand_with_claude(entry)
                          if expanded is None:
                              summary_rows.append(
                                  f'| ❌ | `{entry_id}` | {title} | Claude API call failed |'
                              )
                              continue
                          if expanded.get('needs_human'):
                              summary_rows.append(
                                  f'| 🙋 | `{entry_id}` | {title} '
                                  f'| Needs human: roadmap context insufficient for expansion |'
                              )
                              continue
                          body = expanded.get('body') or body
                          ac = expanded.get('acceptance_criteria') or ac
                          # Validate shapes returned by Claude before trusting them.
                          # body must be a non-empty str; ac must be a list of non-empty strs.
                          if not isinstance(body, str) or not body.strip():
                              summary_rows.append(
                                  f'| ❌ | `{entry_id}` | {title} '
                                  f'| Claude returned invalid body (expected non-empty string) |'
                              )
                              continue
                          if (not isinstance(ac, list) or not ac
                                  or not all(isinstance(item, str) and item.strip() for item in ac)):
                              summary_rows.append(
                                  f'| ❌ | `{entry_id}` | {title} '
                                  f'| Claude returned invalid acceptance_criteria '
                                  f'(expected list of non-empty strings) |'
                              )
                              continue
                      else:
                          summary_rows.append(
                              f'| ⚠️ | `{entry_id}` | {title} '
                              f'| Skipped: body/acceptance_criteria missing '
                              f'and ANTHROPIC_API_KEY not configured |'
                          )
                          continue

                  if not body:
                      summary_rows.append(
                          f'| ⚠️ | `{entry_id}` | {title} | Skipped: body is empty |'
                      )
                      continue

                  # ── Build issue body ─────────────────────────────────────────
                  issue_body = build_issue_body(entry_id, body, ac)

                  # ── Build label list ─────────────────────────────────────────
                  auto_assign = entry.get('auto_assign')
                  if auto_assign is None:
                      auto_assign = True
                  labels = ['from-backlog']
                  if auto_assign:
                      labels.append('copilot:ready')
                  for lbl in (entry.get('labels') or []):
                      labels.append(lbl)

                  label_str = ', '.join(f'`{l}`' for l in labels)

                  if DRY_RUN:
                      summary_rows.append(
                          f'| 🔍 | `{entry_id}` | {title} '
                          f'| Would create issue with labels: {label_str} (dry run) |'
                      )
                      continue

                  # ── Create issue ─────────────────────────────────────────────
                  with tempfile.NamedTemporaryFile('w', suffix='.md', delete=False) as f:
                      f.write(issue_body)
                      body_file = f.name

                  try:
                      cmd = [
                          'gh', 'issue', 'create',
                          '--repo', REPO,
                          '--title', title,
                          '--body-file', body_file,
                      ]
                      for lbl in labels:
                          cmd += ['--label', lbl]
                      r = subprocess.run(cmd, capture_output=True, text=True)
                  finally:
                      os.unlink(body_file)

                  if r.returncode != 0:
                      err = r.stderr.strip()[:200]
                      summary_rows.append(
                          f'| ❌ | `{entry_id}` | {title} | Failed to create issue: {err} |'
                      )
                      continue

                  issue_url = r.stdout.strip()
                  try:
                      new_num = int(issue_url.rstrip('/').split('/')[-1])
                  except (ValueError, IndexError):
                      summary_rows.append(
                          f'| ❌ | `{entry_id}` | {title} '
                          f'| Could not parse issue number from: {issue_url} |'
                      )
                      continue

                  write_backs.append((i, new_num))
                  # Update in-memory entry so downstream depends_on checks in the
                  # same run see this issue number (ISS-09).
                  entry['issue'] = new_num

                  action = (
                      'copilot:ready applied'
                      if auto_assign
                      else 'held for human review (auto_assign: false)'
                  )
                  summary_rows.append(
                      f'| ✅ | `{entry_id}` | {title} '
                      f'| Created [#{new_num}]({issue_url}) — {action} |'
                  )

              # ── Write back issue numbers (yq preserves comments) ─────────────
              # Guard with DRY_RUN: dry runs must not mutate backlog.yaml (ISS-05).
              if not DRY_RUN:
                  for (idx, num) in write_backs:
                      yq_set_issue(idx, num)

                  if write_backs:
                      with open(GITHUB_OUTPUT, 'a') as f:
                          f.write('changed=true\n')

              # ── Job summary ──────────────────────────────────────────────────
              with open(GITHUB_STEP_SUMMARY, 'a') as f:
                  f.write('## Backlog Dispatch Summary\n\n')
                  f.write('| Status | ID | Title | Note |\n')
                  f.write('|--------|-----|-------|------|\n')
                  for row in summary_rows:
                      f.write(row + '\n')
                  if not summary_rows:
                      f.write('| — | — | — | No entries to process |\n')

              print(f'Done. {len(write_backs)} write-back(s) performed.')


          if __name__ == '__main__':
              main()
          PYEOF

      - name: Commit write-back
        # Skip if dry-run or if no new issue numbers were written back.
        if: inputs.dry_run != 'true' && steps.dispatch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .context/backlog.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit (no-op guard)."
          else
            git commit -m "chore: write back issue numbers to backlog.yaml [skip ci]"
            git push
          fi
