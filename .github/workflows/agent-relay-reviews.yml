# Relay Bot Reviews to Copilot (opt-in)
# --------------------------------------
# Reads review comments from ALL bots (Gemini, Claude, Copilot code review, ChatGPT Codex)
# and reposts them as a single @copilot comment from your user account (via PAT).
#
# Status:
#   This workflow is OPT-IN. By default, review resolution is handled by
#   `agent-fix-reviews.yml` (Claude with Sonnet), which produces higher-quality
#   resolutions on complex/structural feedback at the cost of Claude API
#   spend. The two paths are alternatives — pick `copilot-relay` for cheap
#   mechanical fixes (Copilot is included in subscription); pick
#   `claude-fix` for nuanced design feedback. Neither is deprecated.
#   Enable this relay specifically when you want Copilot — not Claude
#   — to drive resolution (for example, when the fixes are concentrated
#   in `.github/workflows/**` files that the Claude app token can't push
#   to, and you don't want Claude to delegate piecemeal).
#
# How to enable:
#   Add the `copilot-relay` label directly to the PR. The label can be
#   applied either when the PR is opened or retroactively — adding it
#   later fires the `pull_request.labeled` trigger below, which runs a
#   relay pass over the existing reviews. (Issue labels are not
#   automatically copied onto Copilot's PR.)
#
# Why this exists:
#   - Copilot cloud agent only sees @copilot mentions from collaborators
#   - Copilot ignores review comments posted by other bots (Gemini, Claude, ChatGPT Codex)
#   - Copilot CAN write to .github/workflows/ files (Claude's app token cannot)
#   - This relay bridges the gap: bots review → relay reposts → Copilot fixes
#
# How it works:
#   1. Triggers when a review is submitted on a same-repo PR that carries
#      the `copilot-relay` label, OR when the `copilot-relay` label is
#      added to a PR retroactively. (NOT on individual inline review
#      comments — see the `on:` block for why; an N-comment review
#      would otherwise burn N budget cycles.)
#   2. Waits 180s for all reviewers to finish posting (longer settle
#      lets `cancel-in-progress: true` coalesce multiple reviewers'
#      reviews into a single relay comment)
#   3. Reads ALL review threads via GitHub API
#   4. Filters to unresolved comments from bot reviewers
#   5. Computes a fingerprint of the unresolved set; skips if the prior
#      relay's fingerprint matches (no new content → don't burn budget)
#   6. Formats them into a structured @copilot comment
#   7. Posts the comment using CLAUDE_PAT (appears as your user)
#   8. Copilot picks up the @copilot mention and fixes the issues
#
# Cost: $0 — no AI API calls. Just GitHub API reads + one comment post.
#
# Safety:
#   - Only runs on same-repo (non-fork) PRs
#   - Skips if no actionable bot comments found
#   - Max 3 relay cycles per PR (prevents infinite loops)
#   - Won't relay comments from copilot itself (it already sees its own)
#   - Won't relay if copilot is the review author (it can see its own reviews)
#
# Required secrets:
#   - CLAUDE_PAT: Fine-grained PAT with Contents + Pull requests + Issues RW
#
# Optional labels:
#   - no-auto-ready: Skip auto-ready (on agent-auto-ready.yml)
#   - auto-merge: Enable auto-merge (on agent-auto-merge.yml; opt-in)

name: Relay Bot Reviews to Copilot

on:
  pull_request_review:
    types: [submitted]
  # Retroactive enablement: if the PR was opened without `copilot-relay`
  # and a maintainer adds it later, fire a relay pass over all existing
  # reviews. The same `pull_request.labeled` trigger also fires the
  # `phase4-fallback` job when Copilot adds the `phase4-needs-fallback`
  # label after a Phase 4 mutation returns FORBIDDEN. Each consumer
  # job filters by `github.event.label.name`, so only the matching
  # job runs per label event.
  pull_request:
    types: [labeled]
  # Phase 4 fallback manual override: lets a maintainer fire the
  # fallback from the Actions UI without re-triggering Copilot. See
  # ADR-008 "Why not issue_comment-triggered fallback (post-mortem)."
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run phase4-fallback against"
        required: true
        type: number
  # NOTE: `pull_request_review_comment` is intentionally NOT listed here.
  # A review with N inline comments fires N comment events + 1 review
  # event. Triggering on both burns the 3-cycle relay budget fast — each
  # reviewer's stream of inline-comment events would post a separate
  # relay before Copilot has had a chance to act on the prior one. The
  # `pull_request_review` (submitted) trigger fires once per reviewer
  # and is sufficient: the relay step reads ALL unresolved threads via
  # GraphQL, so inline comments are still picked up.

# Concurrency is set per-job: the `relay` and `phase4-fallback` jobs
# need different group keys (different event payloads expose the PR
# number differently — `pull_request.number` vs `issue.number`) and
# must not cancel each other.

jobs:
  relay:
    # Only on same-repo PRs, only when explicitly enabled by the
    # `copilot-relay` label, for change-request / commented reviews or
    # for the label being added retroactively.
    #
    # Fork guard: CLAUDE_PAT is a write-capable secret used to post the
    # relay comment. Requiring the label (maintainers only) is already a
    # strong gate, but we add an explicit fork check for defense in depth.
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'copilot-relay') &&
      !contains(github.event.pull_request.labels.*.name, 'smoke-test') &&
      (
        (github.event_name == 'pull_request_review' &&
         (github.event.review.state == 'changes_requested' ||
          github.event.review.state == 'commented')) ||
        (github.event_name == 'pull_request' &&
         github.event.action == 'labeled' &&
         github.event.label.name == 'copilot-relay')
      )

    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: relay-reviews-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      pull-requests: read
      contents: read

    steps:
      # Skip if the review came from copilot (it sees its own comments)
      # or from the relay itself (loop prevention).
      # Only meaningful for `pull_request_review` events — the `labeled`
      # trigger has no review to inspect, so we skip this step there.
      - name: Check review author
        id: author
        if: github.event_name == 'pull_request_review'
        run: |
          reviewer="${{ github.event.review.user.login }}"

          echo "reviewer=$reviewer"

          # Skip the Copilot SWE agent's own reviews (loop prevention) and
          # our own relayed comments (they come from the PAT owner, posting
          # as github-actions[bot]).
          # Note: `copilot-pull-request-reviewer` is intentionally NOT
          # skipped — it's the Copilot Code Review bot that posts inline
          # suggestions, and its review comments SHOULD be relayed to the
          # SWE agent so it can act on them. The fingerprint dedup gate
          # (further down) prevents redundant relays of unchanged comment
          # sets.
          if [[ "$reviewer" == "copilot" || "$reviewer" == "copilot[bot]" || "$reviewer" == "github-actions[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Check relay cycle budget
      - name: Check relay budget
        if: steps.author.outputs.skip != 'true'
        id: budget
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MAX_CYCLES=3
          relay_count=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json comments \
            --jq '[.comments[] | select(.body | contains("📋 **Review Relay"))] | length' 2>/dev/null || echo "0")

          echo "Relay cycles: $relay_count / $MAX_CYCLES"

          if [[ "$relay_count" -ge "$MAX_CYCLES" ]]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
              --body "⚠️ **Relay budget exhausted** ($relay_count/$MAX_CYCLES). Remaining bot comments need manual review or direct @copilot tagging."
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
            echo "cycle=$(( relay_count + 1 ))" >> "$GITHUB_OUTPUT"
          fi

      # Wait for all reviewers to finish posting.
      # Bumped from 90s → 180s: with cancel-in-progress: true, a longer
      # settle window gives more chance for the next reviewer's review
      # event to land and cancel this run, coalescing 3 reviewers'
      # near-simultaneous reviews into a single relay comment instead
      # of three. This is the main lever against budget exhaustion when
      # several bot reviewers post within a few minutes of each other.
      - name: Wait for reviewers to settle
        if: >
          steps.author.outputs.skip != 'true' &&
          steps.budget.outputs.exceeded != 'true'
        run: |
          echo "Waiting 180 seconds for all reviewers to finish posting..."
          sleep 180

      # Collect and relay bot review comments
      - name: Collect and relay bot comments
        if: >
          steps.author.outputs.skip != 'true' &&
          steps.budget.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CYCLE: ${{ steps.budget.outputs.cycle }}
        run: |
          echo "Collecting unresolved review threads from all bot reviewers..."

          owner="${REPO%/*}"
          name="${REPO#*/}"

          # Known AI reviewer logins (GraphQL returns these without the [bot]
          # suffix). Update this single list when new AI reviewers are added.
          AI_REVIEWERS="copilot-pull-request-reviewer|gemini-code-assist|codex|chatgpt-codex-connector|claude"

          # ── Fetch unresolved review threads via GraphQL (paginated) ──
          # Review threads carry the ground-truth isResolved flag that REST
          # endpoints don't expose. We paginate both reviewThreads and the
          # per-thread comments so PRs with > 100 threads or > 50 comments
          # per thread are fully covered.
          threads_acc='[]'
          cursor=""
          while :; do
            if [[ -n "$cursor" ]]; then
              page=$(gh api graphql \
                -F owner="$owner" -F name="$name" -F number="$PR_NUMBER" -F after="$cursor" \
                -f query='
                  query($owner:String!, $name:String!, $number:Int!, $after:String!) {
                    repository(owner:$owner, name:$name) {
                      pullRequest(number:$number) {
                        reviewThreads(first: 100, after: $after) {
                          nodes {
                            id
                            isResolved
                            path
                            line
                            comments(first: 100) {
                              nodes { author { login } body url }
                              pageInfo { hasNextPage endCursor }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' 2>/dev/null) || { page=''; break; }
            else
              page=$(gh api graphql \
                -F owner="$owner" -F name="$name" -F number="$PR_NUMBER" \
                -f query='
                  query($owner:String!, $name:String!, $number:Int!) {
                    repository(owner:$owner, name:$name) {
                      pullRequest(number:$number) {
                        reviewThreads(first: 100) {
                          nodes {
                            id
                            isResolved
                            path
                            line
                            comments(first: 100) {
                              nodes { author { login } body url }
                              pageInfo { hasNextPage endCursor }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' 2>/dev/null) || { page=''; break; }
            fi

            page_nodes=$(echo "$page" | jq '.data.repository.pullRequest.reviewThreads.nodes // []')
            threads_acc=$(jq -n --argjson a "$threads_acc" --argjson b "$page_nodes" '$a + $b')

            has_next=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [[ "$has_next" != "true" ]]; then
              break
            fi
            cursor=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
            if [[ -z "$cursor" ]]; then
              break
            fi
          done

          # For any thread whose first page of comments was truncated, fetch
          # the remaining comment pages and merge them into the thread.
          # Use NUL-delimited iteration so node IDs with unusual characters
          # are handled safely.
          while IFS= read -r thread_id; do
            [[ -z "$thread_id" ]] && continue
            comment_cursor=$(echo "$threads_acc" | jq -r --arg id "$thread_id" '.[] | select(.id == $id) | .comments.pageInfo.endCursor // empty')
            while [[ -n "$comment_cursor" ]]; do
              cpage=$(gh api graphql \
                -F threadId="$thread_id" -F after="$comment_cursor" \
                -f query='
                  query($threadId:ID!, $after:String!) {
                    node(id:$threadId) {
                      ... on PullRequestReviewThread {
                        comments(first: 100, after: $after) {
                          nodes { author { login } body url }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' 2>/dev/null) || break
              extra_nodes=$(echo "$cpage" | jq '.data.node.comments.nodes // []')
              has_next=$(echo "$cpage" | jq -r '.data.node.comments.pageInfo.hasNextPage')
              # Append nodes and refresh pageInfo so it reflects the merged
              # state (no stale hasNextPage/endCursor left behind).
              threads_acc=$(jq --arg id "$thread_id" --argjson extra "$extra_nodes" --argjson hn "$([[ "$has_next" == "true" ]] && echo true || echo false)" \
                'map(if .id == $id then .comments.nodes += $extra | .comments.pageInfo.hasNextPage = $hn else . end)' <<<"$threads_acc")
              if [[ "$has_next" != "true" ]]; then
                comment_cursor=""
              else
                comment_cursor=$(echo "$cpage" | jq -r '.data.node.comments.pageInfo.endCursor // empty')
              fi
            done
          done <<<"$(echo "$threads_acc" | jq -r '.[] | select(.comments.pageInfo.hasNextPage == true) | .id')"

          # ── Fetch top-level reviews (paginated) ──
          reviews_acc='[]'
          cursor=""
          while :; do
            if [[ -n "$cursor" ]]; then
              rpage=$(gh api graphql \
                -F owner="$owner" -F name="$name" -F number="$PR_NUMBER" -F after="$cursor" \
                -f query='
                  query($owner:String!, $name:String!, $number:Int!, $after:String!) {
                    repository(owner:$owner, name:$name) {
                      pullRequest(number:$number) {
                        reviews(first: 100, after: $after) {
                          nodes { state body author { login } }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' 2>/dev/null) || break
            else
              rpage=$(gh api graphql \
                -F owner="$owner" -F name="$name" -F number="$PR_NUMBER" \
                -f query='
                  query($owner:String!, $name:String!, $number:Int!) {
                    repository(owner:$owner, name:$name) {
                      pullRequest(number:$number) {
                        reviews(first: 100) {
                          nodes { state body author { login } }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' 2>/dev/null) || break
            fi
            page_nodes=$(echo "$rpage" | jq '.data.repository.pullRequest.reviews.nodes // []')
            reviews_acc=$(jq -n --argjson a "$reviews_acc" --argjson b "$page_nodes" '$a + $b')
            has_next=$(echo "$rpage" | jq -r '.data.repository.pullRequest.reviews.pageInfo.hasNextPage')
            if [[ "$has_next" != "true" ]]; then
              break
            fi
            cursor=$(echo "$rpage" | jq -r '.data.repository.pullRequest.reviews.pageInfo.endCursor // empty')
            if [[ -z "$cursor" ]]; then
              break
            fi
          done

          threads_json=$(jq -n --argjson t "$threads_acc" --argjson r "$reviews_acc" \
            '{reviewThreads: {nodes: $t}, reviews: {nodes: $r}}')

          # ── Extract actionable inline comments (unresolved threads only) ──
          # Bot detection: match logins ending with [bot] (standard GitHub App
          # convention) OR known AI reviewer logins that the GraphQL API returns
          # without the [bot] suffix. Exclude the Copilot SWE agent itself
          # (login "copilot" or "copilot[bot]") to prevent relaying its own reviews.
          inline_comments=$(echo "$threads_json" | jq --arg bots "$AI_REVIEWERS" '
            [ (.reviewThreads.nodes // [])[]
              | select(.isResolved == false)
              | . as $thread
              | ($thread.comments.nodes // [])[]
              | select(
                  (
                    (.author.login | test("\\[bot\\]$"))
                    or (.author.login | test("^(" + $bots + ")$"))
                  )
                  and (.author.login | test("^copilot(\\[bot\\])?$") | not)
                )
              | {
                  reviewer: .author.login,
                  file:     ($thread.path // "N/A"),
                  line:     ($thread.line // "N/A"),
                  body:     .body,
                  url:      .url
                }
            ]' 2>/dev/null || echo "[]")

          # ── Extract review-level summaries (no isResolved on reviews) ──
          review_comments=$(echo "$threads_json" | jq --arg bots "$AI_REVIEWERS" '
            [ (.reviews.nodes // [])[]
              | select(
                  (
                    (.author.login | test("\\[bot\\]$"))
                    or (.author.login | test("^(" + $bots + ")$"))
                  )
                  and (.author.login | test("^copilot(\\[bot\\])?$") | not)
                  and (.state == "CHANGES_REQUESTED" or .state == "COMMENTED")
                  and (.body != null) and (.body != "")
                )
              | { reviewer: .author.login, state: .state, body: .body }
            ]' 2>/dev/null || echo "[]")

          inline_count=$(echo "$inline_comments" | jq 'length' 2>/dev/null || echo "0")
          review_count=$(echo "$review_comments" | jq 'length' 2>/dev/null || echo "0")
          total=$((inline_count + review_count))

          echo "Found $inline_count unresolved inline comments and $review_count review-level comments from bots."

          if [[ "$total" -eq 0 ]]; then
            echo "No actionable bot comments found. Skipping relay."
            exit 0
          fi

          # ── Dedup gate ──
          # Compute a fingerprint of the unresolved bot-comment URL set.
          # If the most recent prior relay has the same fingerprint, the
          # set of things to fix hasn't changed since we last asked
          # Copilot — re-posting would burn another budget cycle without
          # giving Copilot any new information. Skip in that case.
          fingerprint=$(jq -n --argjson i "$inline_comments" --argjson r "$review_comments" '
            ([ ($i // [])[].url, ($r // [])[] | (.reviewer + ":" + (.body // "" | tostring))[0:200] ]
              | sort | join("|"))' | sha256sum | awk '{print $1}')
          echo "Relay fingerprint: $fingerprint"

          prev_fingerprint=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq '[.comments[] | select(.body | contains("📋 **Review Relay"))] | last | .body
                  | capture("<!-- relay-fingerprint:(?<fp>[a-f0-9]+) -->") | .fp' 2>/dev/null || echo "")
          if [[ -n "$prev_fingerprint" && "$prev_fingerprint" == "$fingerprint" ]]; then
            echo "Unresolved bot-comment set unchanged since last relay (fingerprint $fingerprint). Skipping to preserve budget."
            exit 0
          fi

          # ── Build the relay comment with real newlines ──
          # Using $'\n' + printf '%s' so reviewer bodies containing
          # backslash sequences (\c, \t, \0NNN, …) pass through verbatim.
          nl=$'\n'

          comment="📋 **Review Relay (cycle ${CYCLE}/3)** — Forwarding ${total} comment(s) from bot reviewers.${nl}"
          comment+="<!-- relay-fingerprint:${fingerprint} -->${nl}${nl}"
          comment+="@copilot follow .github/prompts/pr-resolve-all.md${nl}${nl}"
          comment+="Apply that procedure to the review feedback collected below. In particular:${nl}${nl}"
          comment+="1. **Phase 1 — Issue/Suggestion Index**: Build a sequentially-numbered index (\`ISS-01\`, \`ISS-02\`, …) of every item below, and **post it as a standalone PR comment before any fixes or commits**, regardless of count. Do not fold the index into the resolution report.${nl}"
          comment+="2. **Phase 2 — Verify, Fix, Validate**: For each item, link → verify → fix → run tests/lint/build → assign a status.${nl}"
          comment+="3. **Phase 4 — Auto-resolve bot-authored threads (runs BEFORE Phase 3 posts)**: Run Phase 4 as defined in the prompt file — post an audit-trail reply and fire the \`resolveReviewThread\` mutation for each thread whose root comment was authored by an allow-listed bot and whose matching \`ISS-NN\` status is \`✅ Fixed\`. Never resolve human-authored threads. The Phase 4 report MUST include the canonical \`Thread ID\` column (GraphQL node ID, \`PRRT_…\`); on this Copilot path the mutations may return \`FORBIDDEN\` (your token lacks \`pull-requests:write\`), in which case mark those rows \`⚠️ Errored\` and the relay-fallback job will retry them under \`CLAUDE_PAT\`. Collect the Phase 4 results so Phase 3 can include them as a subsection of its report.${nl}"
          comment+="4. **Phase 3 — Resolution Report**: After all fixes are pushed **and** Phase 4 has completed, post a separate, later PR comment with the final summary table, per-item details, and the Phase 4 subsection.${nl}${nl}"
          comment+="The Phase-1 Index and Phase-3 Resolution Report MUST be two distinct PR comments, in that order — same shape Claude uses on the default fix path.${nl}${nl}"
          comment+="---${nl}${nl}"

          if [[ "$review_count" -gt 0 ]]; then
            review_section=$(echo "$review_comments" | jq -r '.[] |
              "### Review from \(.reviewer) (\(.state))\n\(.body)\n\n---\n"')
            comment+="${review_section}${nl}${nl}"
          fi

          if [[ "$inline_count" -gt 0 ]]; then
            comment+="### Inline Comments${nl}${nl}"
            inline_section=$(echo "$inline_comments" | jq -r '
              sort_by(.file) | group_by(.file) | .[] |
              "**\(.[0].file)**\n" +
              ([.[] |
                "- **Line \(.line)** (\(.reviewer)): \(.body | split("\n") | join(" ") | .[0:500])"
              ] | join("\n")) +
              "\n"')
            comment+="${inline_section}${nl}"
          fi

          comment+="${nl}---${nl}"
          comment+="*This comment was auto-generated by the review relay workflow. "
          comment+="Bot reviewers' comments were collected and forwarded so Copilot can act on them.*"

          # ── Post the comment ──
          # Using CLAUDE_PAT so it appears as the repo owner, not a bot.
          # Copilot will see the @copilot mention and act on it.
          printf '%s' "$comment" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -

          echo "✅ Relayed $total bot review comments to Copilot via @copilot mention."

  # ──────────────────────────────────────────────────────────────────
  # phase4-fallback
  # ──────────────────────────────────────────────────────────────────
  # Runs when Copilot posts its Phase 3 Resolution Report. Parses the
  # Phase 4 table for `⚠️ Errored` rows (Copilot's mutations returned
  # FORBIDDEN because its cloud-agent token lacks `pull-requests:write`)
  # and re-fires the GraphQL audit-reply + resolveReviewThread mutations
  # under CLAUDE_PAT. Idempotent via fingerprint of the errored Thread
  # IDs — re-runs are no-ops when the set is unchanged.
  #
  # See ADR-008 for the design rationale and #100 for the FORBIDDEN
  # evidence on the Copilot path.
  phase4-fallback:
    # Job-level filter:
    #   - `pull_request.labeled` event with label `phase4-needs-fallback`
    #     (Copilot's `pr-resolve-all.md` Phase 4 step adds this label
    #     when any thread mutation returns FORBIDDEN), OR
    #   - `workflow_dispatch` manual override.
    #
    # Why not `issue_comment` (post-mortem):
    #   GitHub gates `issue_comment` events from app/bot identities
    #   without write access on every run with `action_required`,
    #   regardless of the per-repo first-time-contributor setting.
    #   That gate makes the fallback non-autonomous. Label events from
    #   the same identities are not gated the same way. See ADR-008.
    #
    # Intentionally NOT in the if:
    #   - Repository fork check: `pull_request.labeled` does expose
    #     `head.repo`, but we keep the explicit fork guard step below
    #     as defense in depth before any CLAUDE_PAT use.
    if: >
      (github.event_name == 'pull_request' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'phase4-needs-fallback') ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    timeout-minutes: 5

    concurrency:
      group: phase4-fallback-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: false

    permissions:
      pull-requests: write
      contents: read

    steps:
      # Fork guard — must run BEFORE any step that uses CLAUDE_PAT.
      # Uses the default GITHUB_TOKEN (read-only on forks) to fetch the
      # PR head ref. Fails closed if the PR can't be fetched or is
      # cross-repository.
      - name: Fork guard
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          meta=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json isCrossRepository,headRepositoryOwner,headRepository 2>&1) || {
            echo "❌ Could not fetch PR metadata for fork guard. Refusing to proceed."
            echo "$meta"
            exit 1
          }
          is_cross=$(printf '%s' "$meta" | jq -r '.isCrossRepository')
          if [[ "$is_cross" != "false" ]]; then
            echo "❌ Refusing to run phase4-fallback on cross-repository (fork) PR."
            echo "    CLAUDE_PAT must not be exposed when the PR head is from a fork."
            printf '%s\n' "$meta"
            exit 1
          fi

      - name: Run Phase 4 fallback
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail

          nl=$'\n'

          # ── 1. Find the most recent Copilot-authored Phase 3
          # Resolution Report comment on this PR. Under the label-trigger
          # model the workflow no longer has a specific comment ID from
          # the event payload, so we scan the PR's comments and pick the
          # latest one whose body contains the Phase 4 header and whose
          # author normalizes to a Copilot identity. ──
          allowlist='["copilot","copilot-swe-agent","copilot-pull-request-reviewer"]'
          body=$(gh api --paginate "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[]
                   | select(
                       (.user.login | sub(\"\\\\[bot\\\\]$\";\"\")
                                    | ascii_downcase
                                    | IN(${allowlist}[]))
                       and (.body | contains(\"### Phase 4 — Thread auto-resolution\"))
                     )]
                   | sort_by(.created_at)
                   | last
                   | .body // \"\"")

          if [[ -z "$body" || "$body" == "null" ]]; then
            echo "No Copilot-authored Phase 3 Resolution Report found on PR #${PR_NUMBER}. Nothing to do."
            exit 0
          fi

          # ── 1b. Header sanity check (also implicitly enforced by the
          # jq filter above; kept as belt-and-suspenders). ──
          if ! printf '%s' "$body" | grep -qF '### Phase 4 — Thread auto-resolution'; then
            echo "Phase 4 header not found in latest Copilot comment. Nothing to do."
            exit 0
          fi

          # ── 2. Extract the Phase 4 section ──
          # Slice from the Phase 4 header to the next `### ` header (or EOF).
          phase4=$(printf '%s' "$body" | awk '
            /^### Phase 4 — Thread auto-resolution/ {flag=1; next}
            flag && /^### / {exit}
            flag {print}')

          if [[ -z "$phase4" ]]; then
            echo "Phase 4 section was empty after extraction. Nothing to do."
            exit 0
          fi

          # ── 3. Count Errored rows independently from valid Thread ID
          # extraction. This lets us distinguish "no errored rows" (a
          # legit no-op) from "errored rows present but the Thread ID
          # column was malformed" (a parse error that ADR-008 requires
          # we loud-fail on rather than silently skip). ──
          errored_row_count=$(printf '%s' "$phase4" | awk -F'|' '
            /^\|/ && !/^\|[[:space:]]*-+/ && !/^\|[[:space:]]*Thread[[:space:]]*\|/ {
              if (NF >= 7) {
                action=$6
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", action)
                if (action ~ /Errored/) print "x"
              }
            }' | wc -l | tr -d ' ')

          # ── 4. Parse table rows where Action == ⚠️ Errored. Strip
          # optional surrounding backticks (e.g. `PRRT_…`) before the
          # PRRT_ prefix check.
          # Expected columns (after stripping leading/trailing pipes):
          # Thread | Thread ID | ISS | Author | Action | Notes ──
          errored_ids=$(printf '%s' "$phase4" | awk -F'|' '
            /^\|/ && !/^\|[[:space:]]*-+/ && !/^\|[[:space:]]*Thread[[:space:]]*\|/ {
              # NF includes leading + trailing empty fields from the outer pipes.
              # Columns 2..7 = Thread, Thread ID, ISS, Author, Action, Notes.
              if (NF >= 7) {
                action=$6
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", action)
                if (action ~ /Errored/) {
                  tid=$3
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", tid)
                  gsub(/`/, "", tid)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", tid)
                  if (tid ~ /^PRRT_/) print tid
                }
              }
            }')

          valid_id_count=$(printf '%s\n' "$errored_ids" | grep -c '^PRRT_' || true)

          if [[ "$errored_row_count" -eq 0 ]]; then
            echo "✅ No errored rows in Phase 4 report. Nothing to retry."
            exit 0
          fi

          if [[ "$valid_id_count" -lt "$errored_row_count" ]]; then
            # Loud-fail on parse errors per ADR-008. Dedup the parse-
            # error comment via a fingerprint of the Phase 4 section so
            # re-fires (e.g. comment edits) don't spam the PR.
            parse_fp=$(printf '%s' "$phase4" | sha256sum | awk '{print $1}')
            prev_parse=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
              --jq "[.comments[] | select(.body | contains(\"<!-- relay-fallback-parse-error:${parse_fp} -->\"))] | length" 2>/dev/null || echo "0")
            if [[ "$prev_parse" -gt 0 ]]; then
              echo "Parse-error comment already posted for fingerprint $parse_fp. Skipping."
              exit 1
            fi
            {
              printf '❌ **Phase 4 fallback parse error**%s%s' "$nl" "$nl"
              printf 'The Phase 4 table had **%d** `⚠️ Errored` row(s) but only **%d** valid `PRRT_…` Thread ID(s) could be extracted.%s%s' \
                "$errored_row_count" "$valid_id_count" "$nl" "$nl"
              printf 'Per ADR-008 the `Thread ID` column is required and must contain a GraphQL node ID (`PRRT_…`), with no surrounding markup beyond optional backticks. Re-post the Phase 4 table with a valid Thread ID for each errored row, or resolve the threads manually.%s%s' "$nl" "$nl"
              printf '<!-- relay-fallback-parse-error:%s -->%s' "$parse_fp" "$nl"
            } | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
            echo "❌ Posted parse-error comment (fingerprint $parse_fp). Aborting."
            exit 1
          fi

          # ── 5. Compute fingerprint and dedup against prior fallback comments ──
          fingerprint=$(printf '%s' "$errored_ids" | sort -u | sha256sum | awk '{print $1}')
          echo "Fallback fingerprint: $fingerprint"

          prev=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq "[.comments[] | select(.body | contains(\"<!-- relay-fallback-fingerprint:${fingerprint} -->\"))] | length" 2>/dev/null || echo "0")
          if [[ "$prev" -gt 0 ]]; then
            echo "Fallback already ran for fingerprint $fingerprint. Skipping."
            exit 0
          fi

          # ── 6. Get latest commit SHA on PR head for audit reply ──
          short_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid' | cut -c1-7)

          # ── 7. For each errored thread, post audit reply + resolve ──
          summary="🔁 **Phase 4 fallback (cycle 1)** — relayed under \`CLAUDE_PAT\` because the Copilot cloud-agent token returned \`FORBIDDEN\` on the Phase 4 mutations.${nl}"
          summary+="<!-- relay-fallback-fingerprint:${fingerprint} -->${nl}${nl}"
          summary+="| Thread ID | Action | Result |${nl}"
          summary+="|-----------|--------|--------|${nl}"

          while IFS= read -r tid; do
            [[ -z "$tid" ]] && continue
            row_result=""

            # 7a. Find the matching ISS-NN for this thread ID (best-effort
            # parse from the original Phase 4 table for the audit reply).
            # Strip surrounding backticks from the table's Thread ID cell
            # the same way the main extractor does, otherwise the equality
            # check `cur == target` always fails when Copilot wraps IDs in
            # backticks (e.g. `PRRT_…`) — which produces "(ISS-?)" in the
            # audit reply (see #108).
            iss=$(printf '%s' "$phase4" | awk -F'|' -v target="$tid" '
              /^\|/ && !/^\|[[:space:]]*-+/ {
                if (NF >= 7) {
                  cur=$3
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", cur)
                  gsub(/`/, "", cur)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", cur)
                  if (cur == target) {
                    out=$4; gsub(/^[[:space:]]+|[[:space:]]+$/, "", out)
                    print out; exit
                  }
                }
              }')
            [[ -z "$iss" ]] && iss="ISS-?"

            audit_body="Resolved by relay-fallback (agent-relay-reviews) in ${short_sha} (${iss})."$'\n'"If this wasn't addressed correctly, re-open the thread."

            # 7b. POST audit reply via GraphQL.
            reply_resp=$(gh api graphql \
              -f query='mutation($id:ID!, $body:String!) { addPullRequestReviewThreadReply(input:{pullRequestReviewThreadId:$id, body:$body}) { comment { id } } }' \
              -f id="$tid" \
              -f body="$audit_body" 2>&1) || {
              echo "Audit reply failed for $tid: $reply_resp"
              row_result="❌ audit reply failed"
              summary+="| \`${tid}\` | reply | ${row_result} |${nl}"
              continue
            }

            # 7c. Fire resolveReviewThread.
            resolve_resp=$(gh api graphql \
              -f query='mutation($id:ID!) { resolveReviewThread(input:{threadId:$id}) { thread { id isResolved } } }' \
              -f id="$tid" 2>&1) || {
              echo "Resolve failed for $tid: $resolve_resp"
              row_result="❌ resolve failed (audit reply posted)"
              summary+="| \`${tid}\` | resolve | ${row_result} |${nl}"
              continue
            }

            is_resolved=$(printf '%s' "$resolve_resp" | jq -r '.data.resolveReviewThread.thread.isResolved // false')
            if [[ "$is_resolved" == "true" ]]; then
              row_result="✅ resolved"
            else
              row_result="❌ resolveReviewThread returned isResolved=${is_resolved}"
            fi
            summary+="| \`${tid}\` | reply+resolve | ${row_result} |${nl}"
          done <<< "$errored_ids"

          summary+="${nl}_See ADR-008 for why this fallback exists._"

          printf '%s' "$summary" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -

          # ── 8. Remove the trigger label so the workflow doesn't
          # re-fire on subsequent label events for the same PR. The
          # fingerprint guard above is the primary idempotency layer;
          # label removal is the second. Re-adding the label is the
          # supported way to re-run after a comment edit. Best-effort:
          # a removal failure does not abort the run. ──
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label phase4-needs-fallback \
            || echo "⚠️ Could not remove phase4-needs-fallback label (continuing)."

          echo "✅ Phase 4 fallback complete."

  # ──────────────────────────────────────────────────────────────────
  # copilot-stall-watcher
  # ──────────────────────────────────────────────────────────────────
  # Fixes the failure mode found during V7 (issue #107): Copilot's cloud
  # SWE-agent session sometimes ends after pushing a fix commit and
  # posting only the Phase 1 Issue Index, never emitting the Phase 3
  # Resolution Report. The phase4-fallback job triggers on the Phase 3
  # comment itself, so when that comment never arrives the entire
  # auto-resolve pipeline silently stalls and bot threads stay open.
  #
  # This watcher fires after a successful relay and waits for Copilot's
  # full pipeline to complete. If after ~24 minutes the Issue Index has
  # been posted but the Resolution Report has NOT, it posts one (and
  # only one, per relay cycle) directed nudge asking Copilot to finish.
  # That nudge is itself an `@copilot follow` comment, so it re-engages
  # the same SWE agent.
  #
  # Idempotency: keyed on the relay fingerprint marker so each relay
  # cycle produces at most one nudge ever, even across re-runs.
  #
  # Cost: up to ~24 ubuntu-runner-minutes per relay cycle (mostly
  # sleeping). Concurrency-cancelled by later relays on the same PR.
  #
  # See ADR-008 §"Implementation checklist" and #107 for context.
  copilot-stall-watcher:
    needs: relay
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'copilot-relay') &&
      !contains(github.event.pull_request.labels.*.name, 'smoke-test') &&
      (
        (github.event_name == 'pull_request_review' &&
         (github.event.review.state == 'changes_requested' ||
          github.event.review.state == 'commented')) ||
        (github.event_name == 'pull_request' &&
         github.event.action == 'labeled' &&
         github.event.label.name == 'copilot-relay')
      )

    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: copilot-stall-watcher-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      pull-requests: read
      contents: read

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}

    steps:
      - name: Watch for Copilot Phase 3 Resolution Report
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
        run: |
          set -euo pipefail

          # ── 1. Pin to the most recent relay comment on this PR. The
          # nudge is keyed on this comment's fingerprint so the dedup
          # is per-relay-cycle, not per-PR. ──
          relay_body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq '[.comments[] | select(.body | contains("📋 **Review Relay"))] | last | .body // ""')

          if [[ -z "$relay_body" ]]; then
            echo "No relay comment found on PR #$PR_NUMBER. Nothing to watch."
            exit 0
          fi

          relay_fp=$(printf '%s' "$relay_body" \
            | grep -oE '<!-- relay-fingerprint:[a-f0-9]+ -->' \
            | head -1 \
            | sed -E 's/<!-- relay-fingerprint:([a-f0-9]+) -->/\1/')

          if [[ -z "$relay_fp" ]]; then
            echo "Latest relay comment has no fingerprint marker. Aborting watcher."
            exit 0
          fi

          echo "Watching relay fingerprint: $relay_fp"

          # ── 2. Initial settle: give Copilot time to start posting.
          # On V7 the first Copilot comment landed ~2-3 minutes after
          # the relay; the Issue Index typically posts within ~5 minutes
          # and the Resolution Report within ~10. 8 minutes is a
          # conservative starting point that avoids most spurious early
          # checks. ──
          echo "Sleeping 480s to let Copilot start its pipeline..."
          sleep 480

          # ── 3. Poll every 2 minutes for up to 8 cycles (~16 more
          # minutes, ~24 minutes total). Exit early on success. ──
          MAX_POLLS=8
          POLL_INTERVAL=120

          # Patterns matching the canonical comment shapes that Copilot
          # has historically used for these phases. Both `##` and `###`
          # forms appear in practice (V7 evidence), so accept either
          # heading level. (Addresses PR #110 review thread on line 844.)
          INDEX_PATTERN='#{2,3} (Phase 1: )?Issue/Suggestion Index'
          REPORT_PATTERN='#{2,3} (Phase 3: )?Resolution Report|#{2,3} Phase 4 — Thread auto-resolution'

          for i in $(seq 1 "$MAX_POLLS"); do
            comments=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
              --jq '.comments')

            # Only consider Copilot-authored comments posted AFTER the
            # latest relay (use the relay fingerprint's appearance as a
            # rough timestamp anchor; comments are returned in created
            # order so we can scan tail-first).
            # Login filter must match the same Copilot identities the
            # phase4-fallback job's allowlist accepts: `Copilot`,
            # `copilot[bot]`, `copilot-swe-agent`, and
            # `copilot-swe-agent[bot]`. If we filter narrower than the
            # fallback, we'll miss Index/Report comments authored under
            # the swe-agent identity and either nudge spuriously or fail
            # to nudge a real stall. (Addresses PR #110 review threads
            # on lines 862 and 867.)
            copilot_comments=$(printf '%s' "$comments" | jq -r --arg fp "$relay_fp" '
              # Find the index of the most recent relay comment by
              # looking for our fingerprint marker.
              (map(.body | contains("<!-- relay-fingerprint:" + $fp + " -->")) | index(true)) as $relay_idx
              | if $relay_idx == null then []
                else [
                  .[$relay_idx + 1 :][]
                  | select((.user.login // "") | test("^(copilot|copilot-swe-agent)(\\[bot\\])?$"; "i"))
                  | .body
                ]
                end
              | .[]
            ')

            has_index="false"
            has_report="false"

            if printf '%s' "$copilot_comments" | grep -qE "$INDEX_PATTERN"; then
              has_index="true"
            fi
            if printf '%s' "$copilot_comments" | grep -qE "$REPORT_PATTERN"; then
              has_report="true"
            fi

            echo "Poll $i/$MAX_POLLS: index=$has_index report=$has_report"

            if [[ "$has_report" == "true" ]]; then
              echo "✅ Copilot posted Resolution Report. No nudge needed."
              exit 0
            fi

            if [[ "$i" -lt "$MAX_POLLS" ]]; then
              sleep "$POLL_INTERVAL"
            fi
          done

          # ── 4. Window expired. Decide whether to nudge. Only nudge if
          # Copilot got partway (Index posted) but stopped before Phase
          # 3. If the Index never appeared, Copilot didn't engage at
          # all — that's a different failure mode and a nudge won't
          # help. ──
          if [[ "$has_index" != "true" ]]; then
            echo "ℹ️  Copilot never posted an Issue Index — likely never engaged. Not nudging (a stall nudge would be inappropriate here)."
            exit 0
          fi

          # ── 5. Idempotency: ensure we only nudge once per relay cycle.
          nudge_marker="<!-- copilot-stall-nudge:${relay_fp} -->"
          prev_nudge=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq "[.comments[] | select(.body | contains(\"$nudge_marker\"))] | length" 2>/dev/null || echo "0")
          if [[ "$prev_nudge" -gt 0 ]]; then
            echo "Already nudged for relay $relay_fp. Skipping."
            exit 0
          fi

          # ── 6. Post the nudge as @copilot follow so the SWE agent
          # picks it up and resumes from where it left off. ──
          nl=$'\n'
          body="@copilot follow .github/prompts/pr-resolve-all.md${nl}${nl}"
          body+="Your previous session on this PR posted the **Phase 1 Issue Index** and pushed a fix commit, but did not emit the **Phase 3 Resolution Report**. The relay-fallback job watches for that report to retry any \`⚠️ Errored\` Phase 4 mutations under \`CLAUDE_PAT\` — without it, bot review threads stay open even though the underlying issues are fixed.${nl}${nl}"
          body+="Please complete the remaining phases:${nl}"
          body+="- **Phase 2**: Confirm CI is green for the fix commit you already pushed.${nl}"
          body+="- **Phase 3**: Post the Resolution Report as a separate comment with the canonical \`## Resolution Report\` heading.${nl}"
          body+="- **Phase 4**: Run the thread auto-resolution mutations and include the \`Thread ID\` column in the table per the prompt's Phase 4 spec.${nl}${nl}"
          body+="${nudge_marker}${nl}"
          body+="_Posted automatically by \`copilot-stall-watcher\` (agent-relay-reviews.yml) — see ADR-008 and #107._"

          printf '%s' "$body" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
          echo "✅ Posted stall nudge for relay $relay_fp."
