name: demo-plan

on:
  pull_request:
    paths:
      - "terraform/demo/**"
      - "terraform/modules/**"
      - ".github/workflows/demo-plan.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: demo-plan-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: terraform plan (read-only)
    runs-on: ubuntu-latest
    # Skip on PRs from forks: OIDC role + region secrets are not exposed to
    # untrusted workflows, so the AWS credential step would fail with
    # "Input required and not supplied: aws-region". Reviewers can re-run
    # the plan locally or maintainers can run it on a sync branch.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure AWS credentials (read-only role via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gh-demo-plan-${{ github.run_id }}

      - name: terraform fmt -check
        run: terraform fmt -recursive -check terraform/

      - name: terraform init
        working-directory: terraform/demo
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.DEMO_STATE_BUCKET }}" \
            -backend-config="key=cmmc-level2-aws-enclave-reference/demo/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: terraform validate
        working-directory: terraform/demo
        run: terraform validate

      - name: terraform plan
        working-directory: terraform/demo
        # `set -o pipefail` so a failed `terraform plan` propagates through
        # the `tee` and fails the step. Without it, the plan exit code is
        # masked by tee's success and the workflow proceeds to comment a
        # truncated/empty plan as if it had succeeded.
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan | tee plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/demo/tfplan
          retention-days: 7

      - name: Comment plan summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/demo/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n…(truncated; see full plan in artifact)'
              : plan;
            const body = [
              '### Terraform plan (`terraform/demo/`)',
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>',
              '',
              '> Read-only role; this workflow cannot apply.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
