name: terraform-ci

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

jobs:
  fmt-modules:
    name: terraform fmt (modules + roots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive terraform/

  validate:
    name: validate / lint / scan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    needs: [fmt-modules]
    strategy:
      fail-fast: false
      matrix:
        stack: [govcloud, demo]
    defaults:
      run:
        working-directory: terraform/${{ matrix.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Cache .terraform
        uses: actions/cache@v4
        with:
          path: terraform/${{ matrix.stack }}/.terraform
          key: tf-${{ matrix.stack }}-${{ hashFiles(format('terraform/{0}/**/*.tf', matrix.stack), 'terraform/modules/**/*.tf') }}

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint
        run: |
          tflint --init
          tflint --recursive

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/${{ matrix.stack }}
          framework: terraform
          soft_fail: true
          quiet: true

      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/${{ matrix.stack }}
          soft_fail: true
