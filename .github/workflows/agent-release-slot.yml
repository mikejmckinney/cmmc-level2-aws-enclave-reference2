name: Release Copilot Slot on Close
# Fires when:
#   - A copilot/* PR is closed WITHOUT merging (releases the in-progress slot)
#   - An issue is closed while still labeled copilot:in-progress or copilot:queued
#     (prevents orphaned labels when a human abandons an issue)
#
# After releasing, always tries to drain the queue: the oldest copilot:queued
# issue is promoted back to copilot:ready, which triggers agent-assign-copilot.yml.
#
# Requires: CLAUDE_PAT repo secret (issues:write + pull-requests:read)

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]

concurrency:
  group: release-slot-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  release:
    # Guard: for pull_request events, only run when the PR is from the same
    # repository (not a fork). Fork PRs don't have access to CLAUDE_PAT.
    # For issues events, always run (issues are always in the base repo).
    if: >
      github.event_name == 'issues' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Handle PR closed without merge
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == false &&
          startsWith(github.event.pull_request.head.ref, 'copilot/')
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          REPO: ${{ github.repository }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # grep -P (PCRE) is available on ubuntu-latest (GNU grep). This extracts
          # "closes #N", "fixes #N", "resolves #N" issue references from the PR body.
          linked=$(echo "$PR_BODY" | grep -oiP '(?:closes|fixes|resolves)\s+#\K\d+' || true)

          # Fallback: extract issue number from the branch name when the PR body
          # has no closing keywords. Copilot names branches copilot/issue-NNN-*
          # or copilot/issue-NNN (e.g. copilot/issue-51-assign-gating).
          # NOTE: read HEAD_REF from env (not via inline expression
          # interpolation) to avoid script-injection via untrusted PR
          # branch names (actionlint `expression` rule; GitHub Security
          # Hardening guide).
          if [[ -z "$linked" ]]; then
            linked=$(echo "$HEAD_REF" | grep -oP '(?:^|/)issue-\K\d+(?=[-/]|$)' || true)
          fi

          if [[ -z "$linked" ]]; then
            echo "PR #$PR_NUMBER closed without merge, no linked issues found (body + branch name checked)."
            exit 0
          fi
          for issue in $linked; do
            state=$(gh issue view "$issue" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "")
            if [[ "$state" == "OPEN" ]]; then
              echo "Releasing slot for issue #$issue"
              gh issue edit "$issue" --repo "$REPO" \
                --remove-label "copilot:in-progress" 2>/dev/null || true
              gh issue comment "$issue" --repo "$REPO" \
                --body "🔓 **Slot released.** PR #$PR_NUMBER was closed without merging. Add \`copilot:ready\` to retry, or close this issue if abandoned."
            fi
          done

      - name: Handle issue closed manually
        if: >
          github.event_name == 'issues' &&
          (contains(github.event.issue.labels.*.name, 'copilot:in-progress') ||
           contains(github.event.issue.labels.*.name, 'copilot:queued'))
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          echo "Issue #$ISSUE closed while in copilot workflow. Releasing slot."
          gh issue edit "$ISSUE" --repo "$REPO" \
            --remove-label "copilot:in-progress" \
            --remove-label "copilot:queued" 2>/dev/null || true

      - name: Drain queue
        # Only drain when a slot was actually freed, to avoid spurious queue
        # promotions (and comment spam) on non-Copilot PR/issue closes.
        # Mirrors the exact conditions under which the two preceding steps run.
        if: >
          (github.event_name == 'pull_request' &&
           github.event.pull_request.merged == false &&
           startsWith(github.event.pull_request.head.ref, 'copilot/')) ||
          (github.event_name == 'issues' &&
           (contains(github.event.issue.labels.*.name, 'copilot:in-progress') ||
            contains(github.event.issue.labels.*.name, 'copilot:queued')))
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          REPO: ${{ github.repository }}
        run: |
          next=$(gh issue list --repo "$REPO" --state open \
            --label "copilot:queued" --json number,createdAt \
            --jq 'sort_by(.createdAt) | .[0].number // empty')
          if [[ -n "$next" ]]; then
            echo "Promoting issue #$next from queued to ready"
            gh issue edit "$next" --repo "$REPO" \
              --remove-label "copilot:queued" \
              --add-label "copilot:ready"
          else
            echo "No queued Copilot issues."
          fi
