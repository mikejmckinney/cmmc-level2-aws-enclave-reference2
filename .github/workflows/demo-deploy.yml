name: demo-deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm. Any other value aborts.'
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: demo-deploy
  cancel-in-progress: false

jobs:
  guard:
    name: confirm gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation token
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::confirm input must equal 'DEPLOY' (got: '${{ github.event.inputs.confirm }}')"
            exit 1
          fi

  apply:
    name: terraform apply
    needs: guard
    runs-on: ubuntu-latest
    environment: demo
    if: github.ref == 'refs/heads/main'
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure AWS credentials (deploy role via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gh-demo-deploy-${{ github.run_id }}

      - name: terraform init
        working-directory: terraform/demo
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.DEMO_STATE_BUCKET }}" \
            -backend-config="key=cmmc-level2-aws-enclave-reference/demo/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: terraform apply
        working-directory: terraform/demo
        run: terraform apply -auto-approve

      - name: Capture demo URL
        id: demo
        working-directory: terraform/demo
        run: echo "url=$(terraform output -raw demo_url)" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          {
            echo "## Demo deployed"
            echo ""
            echo "**URL:** ${{ steps.demo.outputs.url }}"
            echo ""
            echo "Auto-destroy runs nightly at 07:00 UTC via demo-destroy.yml."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test demo URL
        run: |
          curl -sf "${{ steps.demo.outputs.url }}" | grep -q "NOT A CUI ENCLAVE"

      - name: Create GitHub deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.demo.outputs.url }}';
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'demo',
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: 'Demo (auto-destroyed nightly).',
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: dep.data.id,
              state: 'success',
              environment_url: url,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Deployed.',
            });
