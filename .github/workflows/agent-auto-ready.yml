# Auto-Ready Copilot Draft PRs
# ------------------------------
# When Copilot cloud agent finishes work, it requests a review from the
# assignee but leaves the PR in draft state. This blocks the review →
# fix → merge pipeline because:
#   - Review bots (Gemini, Claude) often skip draft PRs
#   - Auto-merge workflows correctly refuse to merge drafts
#
# This workflow detects the "Copilot finished" signal (review requested
# on a copilot/* branch draft PR) and marks the PR as ready for review
# via the GitHub API.
#
# The trigger: when Copilot finishes, it fires a `review_requested`
# event. We check if the PR is on a copilot/* branch and is still
# draft. If both are true, we flip it to ready.
#
# Safety:
#   - Only acts on copilot/* branches
#   - Only acts on draft PRs (no-op if already ready)
#   - Short timeout (5 min) since this is a quick API call
#   - Respects `no-auto-ready` label if you want manual control
#
# Auth: Uses CLAUDE_PAT (fine-grained PAT) instead of GITHUB_TOKEN.
#   The default GITHUB_TOKEN cannot call markPullRequestReadyForReview
#   on draft PRs created by bot actors (like Copilot). A PAT owned by
#   a user with write access bypasses this restriction.

name: Auto-Ready Copilot PRs

on:
  pull_request:
    types: [review_requested]

concurrency:
  group: auto-ready-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mark-ready:
    # Only run if:
    #   1. The PR branch starts with copilot/
    #   2. The PR is currently a draft
    if: >
      startsWith(github.event.pull_request.head.ref, 'copilot/') &&
      github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check for opt-out label
        id: check
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$labels" | grep -q "no-auto-ready"; then
            echo "PR has no-auto-ready label. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark PR as ready for review
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Marking PR #$PR_NUMBER as ready for review..."

          gh pr ready "$PR_NUMBER" --repo "${{ github.repository }}"

          echo "✅ PR #$PR_NUMBER is now ready for review."
          echo "Review bots and auto-merge pipeline will take over."

      - name: Post notification
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
            --body "🚀 **Auto-marked as ready for review.** Copilot finished work — review bots and auto-merge pipeline are now active."
