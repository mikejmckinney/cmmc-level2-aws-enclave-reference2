# Claude Code — automated PR review + @claude mention handler
#
# Two jobs:
#   1. claude-auto-review — opt-in via the `claude-review` label. Runs on PR
#      open / reopen / ready_for_review *or* when the `claude-review` label is
#      applied to an existing PR. Invokes the judge subagent
#      (`.claude/agents/judge.md`) to post a single comprehensive review
#      comment. To trigger a review, apply the `claude-review` label to the
#      PR. The label must already exist (or be created by someone with
#      label-management permissions) before it can be applied.
#   2. claude-mention — runs when someone writes `@claude <instruction>` in
#      a PR comment, review comment, or review body. Always available
#      regardless of the `claude-review` label, so it doubles as the escape
#      hatch for one-off reviews on PRs that aren't labeled.
#
# One-time setup required before this workflow does anything:
#   1. Install the Claude GitHub App on this repo:
#        https://github.com/apps/claude
#   2. Add a repo secret named ANTHROPIC_API_KEY (Settings → Secrets and
#      variables → Actions → New repository secret). The value is an
#      Anthropic API key with enough quota to cover PR reviews.
#   3. Add a repo secret named CLAUDE_PAT (required for both jobs).
#      Fine-grained PAT, this repository only, with:
#        - Contents: Read and write
#        - Pull requests: Read and write
#        - Issues: Read and write
#        - Actions: Read
#        - Metadata: Read (auto-selected)
#      Without this, the `claude-review` label runs to completion but
#      silently posts nothing (issue #117).

name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Prevent concurrent reviews from racing on the same PR.
concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # Auto-review — opt-in via the `claude-review` label. Fires on PR
  # open / reopen / ready_for_review when the label is already applied,
  # or on the `labeled` event when the label is added to an existing PR.
  # ----------------------------------------------------------------------
  claude-auto-review:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'claude-review') ||
        (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'claude-review'))
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Auth + permission notes (issue #117 — read before changing):
      #
      # The default config (no github_token, no claude_args) puts the
      # action in "review mode" with permission-mode `acceptEdits`,
      # which auto-denies every non-edit tool call in CI (no human to
      # approve interactive prompts). The prompt below tells Claude to
      # post a single comprehensive review via `gh pr comment`, which
      # requires a Bash tool call — so without `bypassPermissions`,
      # every post attempt is silently denied (12 denials in the PR
      # #113 run, $0.99 wasted, no comment posted).
      #
      # Three coupled fixes, mirroring the working `claude-mention`
      # job below and `agent-fix-reviews.yml` → `resolve-reviews`:
      #   1. github_token: CLAUDE_PAT — avoids the OIDC bot-trigger
      #      401 (see claude-mention auth notes).
      #   2. allowed_bots: "*" — bot-originated triggers (e.g. another
      #      automation re-applying the label) don't fail.
      #   3. claude_args with --permission-mode bypassPermissions —
      #      lets Claude actually call `gh` to post the review.
      #
      # Trade-off: review comment is authored by the PAT owner, not
      # claude[bot]. Same trade-off as claude-mention and
      # agent-fix-reviews; documented for consistency.
      - name: Claude diff-gate review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.CLAUDE_PAT }}
          allowed_bots: "*"
          claude_args: "--model claude-sonnet-4-5 --max-turns 40 --permission-mode bypassPermissions"
          prompt: |
            You are performing an automated diff-gate review on PR
            #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            1. Read `.claude/agents/judge.md` and follow its DIFF-GATE procedure.
            2. Also consult `.claude/agents/critic.md` for subjective-quality
               concerns (hand-wavy reasoning, hidden assumptions, AI clichés).
            3. Format the review using the structure in `.gemini/styleguide.md`
               (Overall Assessment → severity-bucketed Findings → Remaining
               Issues table → Verification Checklist → Testing Recommendations).
            4. End with one of: APPROVE / REQUEST_CHANGES / BLOCK, matching
               judge.md's decision format.
            5. Post the entire review as ONE PR comment. Use a
               single-quoted heredoc so backticks, `$()`, and other
               shell metacharacters in your review markdown are NOT
               interpolated by the shell:
                  cat > /tmp/review.md <<'CLAUDE_REVIEW_EOF'
                  <your review markdown here>
                  CLAUDE_REVIEW_EOF
                  gh pr comment ${{ github.event.pull_request.number }} \
                    --repo ${{ github.repository }} --body-file /tmp/review.md
               Do not push commits, do not edit files, do not open
               sub-issues, do not post inline review comments. Exactly
               one `gh pr comment` call.

  # ----------------------------------------------------------------------
  # @claude mention handler — lets reviewers request follow-ups interactively.
  # ----------------------------------------------------------------------
  claude-mention:
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Auth notes (mirror of agent-fix-reviews.yml):
      #
      # Without `github_token:`, this action falls back to the Claude
      # GitHub App installation token. That token has two limitations
      # that make `@claude follow ...` mentions unreliable as a
      # retroactive run path:
      #   1. The OIDC app-token exchange checks the triggering actor's
      #      write permissions, so mentions from bot reviewers
      #      (gemini-code-assist[bot], copilot) fail with 401.
      #   2. The app token cannot post some comment shapes the
      #      labeled `agent-fix-reviews.yml` path can.
      #
      # Passing CLAUDE_PAT + allowed_bots: "*" gives the mention
      # handler the same write surface as the labeled run, so
      # `@claude follow ...` behaves consistently with applying the
      # `claude-fix` label.
      #
      # Note: GitHub still blocks ALL app/PAT writes under
      # `.github/workflows/**` — workflow-file edits delegate to
      # Copilot regardless of which token is used here.
      - name: Claude mention handler
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.CLAUDE_PAT }}
          allowed_bots: "*"
          # No `prompt:` here — the action extracts instructions from the
          # @claude mention body and dispatches accordingly. Claude will
          # auto-select the appropriate subagent from .claude/agents/
          # based on the mention's intent (e.g. "@claude re-review" uses
          # judge, "@claude fix this" uses an implementer role).
