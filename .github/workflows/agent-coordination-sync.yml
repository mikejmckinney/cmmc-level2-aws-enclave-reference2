name: Coordination Sync

# Comment-only reconciler for `.context/state/coordination.md`.
#
# Solves the "stale claim board" problem from issue #115 without ever
# editing coordination.md directly. The workflow surfaces drift to PR
# comments and a single tracking issue with concrete recommended actions
# (pre-filled lock-block diffs); humans/PM apply the changes.
#
# Why comment-first (not auto-write) in v1
# ----------------------------------------
# Auto-creating claims on PR open is low-confidence: a claim needs more
# than a role (branch, task ID, expected duration, owned paths intent)
# which a workflow can't reliably invent from changed files alone. Auto-
# editing also risks fighting humans who have edited the file for reasons
# the workflow doesn't understand. Mechanical "stale entry on close"
# detection is high-confidence (PR is merged → its claim should go), but
# v1 still surfaces it as a comment rather than a write so a human can
# eyeball the suggestion. A future opt-in `auto-coordinate` label can
# grant write access once the heuristics are trusted.
#
# Three jobs (all in this file):
#   1. on-close-stale       — PR merged/closed → list locks that should
#                             move to "Recent History."
#   2. on-open-missing-claim — PR opened/synchronize → suggest a lock
#                              block if PR touches owned paths and no
#                              Active Lock references its branch.
#   3. daily-reconciliation — scheduled → walk Active Locks; if any lock
#                             is > 7 days old with no matching open PR,
#                             append to a single tracking issue
#                             ("Stale coordination locks", labeled
#                             `coordination-sync`).
#
# Markers (idempotency)
# ---------------------
# Each PR comment carries a marker so subsequent runs upsert rather than
# spam:
#   <!-- coordination-sync-stale -->  — on-close-stale comment
#   <!-- coordination-sync-claim -->  — on-open-missing-claim comment
#   <!-- managed-for-pr:NNN -->       — convention for lock blocks that
#                                        the workflow may suggest removal
#                                        of (humans should not write this
#                                        marker by hand).
#
# Skips on:
#   - PRs from forks (CLAUDE_PAT not exposed; no comment posted)
#   - PRs labeled `no-coordination-check` (opt-out)
#
# Required:
#   - CLAUDE_PAT repo secret (pull-requests:write + issues:write for the
#     scheduled job's tracking-issue upsert).
#
# Related:
#   - Issue #115 (this workflow)
#   - .github/workflows/agent-parallelism-report.yml (pattern reference:
#     CLAUDE_PAT + fork guard + comment upsert)
#   - scripts/parse-ownership-table.sh (path → role mapping)
#   - .context/state/coordination.md (target file; read-only)
#   - .context/state/README.md §Cadence (lock template)

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  schedule:
    # 09:00 UTC daily — matches agent-heartbeat.yml.template cadence.
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: coordination-sync-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  contents: read
  issues: read

jobs:
  on-close-stale:
    name: On close — stale claim detection
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && !contains(github.event.pull_request.labels.*.name, 'no-coordination-check')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Detect and post stale-claim suggestions
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -euo pipefail
          MARKER='<!-- coordination-sync-stale -->'
          COORD='.context/state/coordination.md'

          if [[ ! -f "$COORD" ]]; then
            echo "::notice::$COORD not found; nothing to reconcile."
            exit 0
          fi

          # Find lock blocks matching the PR's branch or carrying a
          # managed-for-pr:NNN marker for this PR. A "lock block" starts
          # at "## Lock:" and runs until the next "## " heading.
          # Find lock blocks under "## Active Locks" matching the PR's
          # branch (literal compare on the parsed Session value, NOT a
          # regex — branch names can contain regex metacharacters like
          # `.`, `(`, `[`) or carrying a managed-for-pr:NNN marker for
          # this PR. Section-scoped so a stale match in Recent History
          # / Blocked / PM Notes can never trigger a false positive.
          # A "lock block" starts at "## Lock:" and runs until the next
          # "## " heading.
          stale_blocks=$(awk -v branch="$BRANCH" -v pr="$PR_NUMBER" '
            function trim(s) { sub(/^[ \t]+/, "", s); sub(/[ \t]+$/, "", s); return s }
            /^## Active Locks/ { in_section=1; next }
            /^## / && !/^## Active Locks/ && !/^## Lock:/ {
              if (in_block && matched) print block
              in_section=0; in_block=0; block=""; matched=0; next
            }
            !in_section { next }
            /^## Lock:/ {
              if (in_block && matched) print block
              in_block=1; block=$0"\n"; matched=0; next
            }
            in_block {
              block = block $0 "\n"
              if (index($0, "**Session**:") == 1) {
                sess = trim(substr($0, length("**Session**:") + 1))
                if (sess == branch) matched=1
              }
              if ($0 ~ ("<!-- managed-for-pr:" pr " -->")) matched=1
            }
            END { if (in_block && matched) print block }
          ' "$COORD")

          if [[ -z "$stale_blocks" ]]; then
            echo "No stale lock blocks found for branch=$BRANCH or pr=$PR_NUMBER."
            exit 0
          fi

          merge_state="closed"
          if [[ "$MERGED" == "true" ]]; then merge_state="merged"; fi

          {
            echo "$MARKER"
            echo ""
            echo "## 🧹 Coordination Sync — stale claim(s) detected"
            echo ""
            echo "This PR was $merge_state. The following Active Lock block(s) in [\`$COORD\`]($GITHUB_SERVER_URL/$REPO/blob/main/$COORD) reference this PR's branch (\`$BRANCH\`) or carry a \`<!-- managed-for-pr:$PR_NUMBER -->\` marker, and should move to **Recent History**:"
            echo ""
            echo '```markdown'
            printf '%s' "$stale_blocks"
            echo '```'
            echo ""
            echo "**Recommended action**: PM (or any role with self-claim) edits \`$COORD\` to move the block(s) above into the Recent History section, with a result line."
            echo ""
            echo "_Comment-only — this workflow does not edit \`$COORD\`. See [issue #115]($GITHUB_SERVER_URL/$REPO/issues/115) for the rationale._"
          } > /tmp/coord_stale.md

          # Upsert.
          existing_id=$(gh api \
            "/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq "[.[] | select(.body | startswith(\"$MARKER\"))] | .[0].id // empty")

          if [[ -n "$existing_id" ]]; then
            gh api --method PATCH "/repos/$REPO/issues/comments/$existing_id" \
              -F body=@/tmp/coord_stale.md > /dev/null
            echo "Edited existing stale-claim comment ($existing_id)."
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body-file /tmp/coord_stale.md > /dev/null
            echo "Posted stale-claim comment."
          fi

  on-open-missing-claim:
    name: On open — missing-claim suggestion
    if: >-
      github.event_name == 'pull_request'
      && github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
      && !contains(github.event.pull_request.labels.*.name, 'no-coordination-check')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Suggest a lock block if none exists
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          MARKER='<!-- coordination-sync-claim -->'
          COORD='.context/state/coordination.md'
          OWNERSHIP='.context/rules/agent_ownership.md'

          if [[ ! -f "$COORD" || ! -f "$OWNERSHIP" ]]; then
            echo "::notice::$COORD or $OWNERSHIP not found; skipping."
            exit 0
          fi

          # Skip if an Active Lock already references this branch.
          # Section-scoped + literal-string compare on the Session value
          # so that (a) a stale Session line in Recent History can't
          # suppress a legitimate suggestion, and (b) branch names
          # containing regex metacharacters (`.`, `[`, `(`) don't
          # produce false matches.
          existing_lock=$(awk -v branch="$BRANCH" '
            function trim(s) { sub(/^[ \t]+/, "", s); sub(/[ \t]+$/, "", s); return s }
            /^## Active Locks/ { in_section=1; next }
            /^## / && !/^## Active Locks/ && !/^## Lock:/ { in_section=0 }
            in_section && index($0, "**Session**:") == 1 {
              if (trim(substr($0, length("**Session**:") + 1)) == branch) { print "yes"; exit }
            }
          ' "$COORD")
          if [[ -n "$existing_lock" ]]; then
            echo "Active lock already references branch=$BRANCH; nothing to suggest."
            exit 0
          fi

          # Get changed files.
          gh pr view "$PR_NUMBER" --repo "$REPO" --json files \
            --jq '.files[].path' > /tmp/changed.txt
          if [[ ! -s /tmp/changed.txt ]]; then
            echo "No changed files; skipping."
            exit 0
          fi

          # Parse ownership prefixes.
          PREFIXES=$(./scripts/parse-ownership-table.sh < "$OWNERSHIP" || true)
          if [[ -z "$PREFIXES" ]]; then
            echo "::warning::ownership table parsed to zero prefixes; skipping suggestion."
            exit 0
          fi

          # Find which roles' prefixes are touched by the changed files.
          # Skip "low-contention" roles (docs, pm) when they're the ONLY
          # owners — a docs-only PR doesn't need a coordination lock.
          matched_roles=""
          while IFS=$'\t' read -r role prefix; do
            [[ -z "$prefix" ]] && continue
            if awk -v p="$prefix" 'index($0, p"/")==1 || $0==p {found=1; exit} END{exit !found}' /tmp/changed.txt; then
              matched_roles="$matched_roles $role"
            fi
          done <<< "$PREFIXES"

          # Dedupe and trim.
          matched_roles=$(printf '%s\n' $matched_roles | sort -u | tr '\n' ' ' | sed 's/^ *//;s/ *$//')
          if [[ -z "$matched_roles" ]]; then
            echo "Changed files don't fall under any owned-path; nothing to suggest."
            exit 0
          fi

          # Skip if only low-contention roles matched.
          implementer_roles=$(printf '%s\n' $matched_roles | grep -viE '^(Docs|PM)$' || true)
          if [[ -z "$implementer_roles" ]]; then
            echo "Only low-contention roles matched ($matched_roles); skipping suggestion."
            exit 0
          fi

          # Build suggested lock block.
          primary=$(printf '%s' "$implementer_roles" | head -1 | tr 'A-Z' 'a-z')
          claimed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          {
            echo "$MARKER"
            echo ""
            echo "## 📌 Coordination Sync — no Active Lock found"
            echo ""
            echo "This PR touches paths owned by: **$matched_roles**, but no entry in [\`$COORD\`]($GITHUB_SERVER_URL/$REPO/blob/main/$COORD) → \`Active Locks\` references branch \`$BRANCH\`."
            echo ""
            echo "**Suggested lock block** (copy into the \`Active Locks\` section):"
            echo ""
            echo '```markdown'
            echo "## Lock: pr-$PR_NUMBER"
            echo "<!-- managed-for-pr:$PR_NUMBER -->"
            echo "**Role**: $primary"
            echo "**Session**: $BRANCH"
            echo "**Claimed At**: $claimed_at"
            echo "**Expected Duration**: TBD"
            echo "**Paths**:"
            head -10 /tmp/changed.txt | sed 's|^|- |'
            if [[ $(wc -l < /tmp/changed.txt) -gt 10 ]]; then
              echo "- … ($(($(wc -l < /tmp/changed.txt) - 10)) more)"
            fi
            echo "**Depends On**: none"
            echo "**Blocks**: none"
            echo "**State**: in_progress"
            echo '```'
            echo ""
            echo "_The \`<!-- managed-for-pr:$PR_NUMBER -->\` marker lets the on-close job suggest removal once this PR closes. Skip this comment with the \`no-coordination-check\` label. See [issue #115]($GITHUB_SERVER_URL/$REPO/issues/115) for rationale._"
          } > /tmp/coord_claim.md

          existing_id=$(gh api \
            "/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq "[.[] | select(.body | startswith(\"$MARKER\"))] | .[0].id // empty")

          if [[ -n "$existing_id" ]]; then
            gh api --method PATCH "/repos/$REPO/issues/comments/$existing_id" \
              -F body=@/tmp/coord_claim.md > /dev/null
            echo "Edited existing claim-suggestion comment ($existing_id)."
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body-file /tmp/coord_claim.md > /dev/null
            echo "Posted claim-suggestion comment."
          fi

  daily-reconciliation:
    name: Daily reconciliation — stale locks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Walk Active Locks; report locks > 7 days with no open PR
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
          REPO: ${{ github.repository }}
          STALE_DAYS: '7'
        run: |
          set -euo pipefail
          COORD='.context/state/coordination.md'
          ISSUE_TITLE='Stale coordination locks'
          ISSUE_LABEL='coordination-sync'

          if [[ ! -f "$COORD" ]]; then
            echo "::notice::$COORD not found; nothing to reconcile."
            exit 0
          fi

          # Collect open PR head-branch names for matching.
          gh pr list --repo "$REPO" --state open --limit 100 \
            --json headRefName --jq '.[].headRefName' > /tmp/open_branches.txt

          # Parse Active Locks blocks: extract task-id, session, claimed-at.
          # Trims trailing whitespace on each value so a markdown line
          # ending in stray spaces doesn't make a session compare-unequal
          # to its corresponding open-PR head branch.
          # Format produced: "task_id<TAB>session<TAB>claimed_at"
          awk '
            function trim(s) { sub(/^[ \t]+/, "", s); sub(/[ \t]+$/, "", s); return s }
            /^## Active Locks/ { in_section=1; next }
            /^## / && !/^## Active Locks/ && !/^## Lock:/ { in_section=0 }
            in_section && /^## Lock:/ {
              if (task != "") print task "\t" session "\t" claimed
              task=trim(substr($0, length("## Lock:") + 1))
              session=""; claimed=""; next
            }
            in_section && index($0, "**Session**:") == 1 {
              session=trim(substr($0, length("**Session**:") + 1)); next
            }
            in_section && index($0, "**Claimed At**:") == 1 {
              claimed=trim(substr($0, length("**Claimed At**:") + 1)); next
            }
            END { if (task != "") print task "\t" session "\t" claimed }
          ' "$COORD" > /tmp/locks.tsv

          if [[ ! -s /tmp/locks.tsv ]]; then
            echo "No Active Locks; nothing to do."
            exit 0
          fi

          now_epoch=$(date -u +%s)
          stale_seconds=$((STALE_DAYS * 86400))
          stale_rows=""

          while IFS=$'\t' read -r task session claimed; do
            [[ -z "$task" ]] && continue
            # Skip if session matches an open PR branch.
            if [[ -n "$session" ]] && grep -qxF "$session" /tmp/open_branches.txt; then
              continue
            fi
            # Skip if claimed-at unparseable.
            claimed_epoch=$(date -u -d "$claimed" +%s 2>/dev/null || echo 0)
            [[ "$claimed_epoch" -eq 0 ]] && continue
            age=$((now_epoch - claimed_epoch))
            if [[ "$age" -gt "$stale_seconds" ]]; then
              age_days=$((age / 86400))
              stale_rows+="| \`$task\` | \`$session\` | $claimed | $age_days |"$'\n'
            fi
          done < /tmp/locks.tsv

          if [[ -z "$stale_rows" ]]; then
            echo "No stale locks (> $STALE_DAYS days with no open PR)."
            exit 0
          fi

          today=$(date -u +'%Y-%m-%d')
          {
            echo "### $today scan"
            echo ""
            echo "| Task | Session | Claimed At | Age (days) |"
            echo "|------|---------|------------|------------|"
            printf '%s' "$stale_rows"
            echo ""
            echo "**Recommended action**: PM verifies each lock above; move completed work to \`Recent History\` in [\`$COORD\`]($GITHUB_SERVER_URL/$REPO/blob/main/$COORD), or update \`Claimed At\` if the work is genuinely still in progress."
          } > /tmp/recon_section.md

          # Find existing tracking issue or create.
          existing=$(gh issue list --repo "$REPO" --label "$ISSUE_LABEL" --state open \
            --search "in:title \"$ISSUE_TITLE\"" --json number --jq '.[0].number // empty')

          if [[ -z "$existing" ]]; then
            # Ensure label exists (idempotent).
            gh label create "$ISSUE_LABEL" --repo "$REPO" \
              --color "BFDADC" --description "Auto-filed by Coordination Sync workflow" 2>/dev/null || true
            {
              printf '> Auto-maintained by [`agent-coordination-sync.yml`](%s/%s/blob/main/.github/workflows/agent-coordination-sync.yml). Each daily scan appends a section. PM closes when the board is reconciled.\n\n' \
                "$GITHUB_SERVER_URL" "$REPO"
              cat /tmp/recon_section.md
            } > /tmp/issue_body.md
            new_url=$(gh issue create --repo "$REPO" \
              --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body-file /tmp/issue_body.md)
            echo "Created tracking issue: $new_url"
          else
            # Append today's section to the existing issue body, but only
            # if today's date isn't already present (idempotent within
            # 24h: a same-day re-run is a no-op). Use --body-file rather
            # than --body to avoid shell argument-length limits as the
            # tracking issue grows over time (each daily scan appends).
            current=$(gh issue view "$existing" --repo "$REPO" --json body --jq '.body')
            if printf '%s' "$current" | grep -qF "### $today scan"; then
              echo "Today's section already present in #$existing; skipping append."
              exit 0
            fi
            {
              printf '%s\n\n' "$current"
              cat /tmp/recon_section.md
            } > /tmp/updated_issue_body.md
            gh issue edit "$existing" --repo "$REPO" --body-file /tmp/updated_issue_body.md > /dev/null
            echo "Appended today's section to #$existing."
          fi
